name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf autotools-dev libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev cmake libgdbm-dev libnss3-dev libsqlite3-dev libreadline-dev tk-dev libbz2-dev
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" cython
      - name: Build with Buildozer
        run: |
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          buildozer --verbose android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-lossless-player
          path: bin/*.apk
