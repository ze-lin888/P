name: Build APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer kivy==2.3.0

      - name: Build with Buildozer
        env:
          # 自动接受安卓 SDK 协议，不再需要 yes 命令
          APP_ANDROID_ACCEPT_SDK_LICENSE: 1
        run: |
          rm -rf .buildozer
          buildozer -v android debug
